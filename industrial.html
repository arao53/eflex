<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>e-flex · Industrial Asset Owner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:       #0a1a2f;
    --ink-soft:  #2a3d59;
    --muted:     #6b7d96;
    --rule:      #d6dee9;
    --paper:     #f4f6fa;
    --paper-2:   #eaeef5;
    --accent:    #1558ff;
    --accent-2:  #0a3bb8;

    --fs-lg:  clamp(44px, 7vw, 88px);
    --fs-md:  19px;
    --fs-sm:  11px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 400;
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.5;
    background-image:
      linear-gradient(to right, rgba(21,88,255,0.035) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(21,88,255,0.035) 1px, transparent 1px);
    background-size: 56px 56px;
  }

  .wrap {
    max-width: 1120px;
    margin: 0 auto;
    padding: 40px 48px 64px;
  }

  /* ---------- nav ---------- */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 80px;
  }
  .mark {
    font-family: 'JetBrains Mono', monospace;
    font-size: var(--fs-sm);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
  }
  .mark .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 8px;
    transform: translateY(-1px);
    box-shadow: 0 0 0 3px rgba(21,88,255,0.12);
  }
  .back {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
  }
  .back:hover { color: var(--accent); }

  /* ---------- heading ---------- */
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent-2);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .eyebrow::before {
    content: "";
    width: 32px;
    height: 1px;
    background: var(--accent-2);
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(32px, 5vw, 56px);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin: 0 0 48px;
    color: var(--ink);
  }

  /* ---------- form ---------- */
  .form-wrap {
    border-top: 1px solid var(--rule);
    padding-top: 48px;
    max-width: 640px;
  }

  /* ---------- footer ---------- */
  footer {
    padding-top: 64px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ---------- responsive ---------- */
  @media (max-width: 860px) {
    .wrap { padding: 28px 24px 40px; }
    nav { padding-bottom: 56px; }
  }

  /* entrance animation */
  .reveal { opacity: 0; transform: translateY(12px); animation: rise 0.9s cubic-bezier(.2,.7,.2,1) forwards; }
  .reveal.d1 { animation-delay: 0.05s; }
  .reveal.d2 { animation-delay: 0.18s; }
  .reveal.d3 { animation-delay: 0.32s; }
  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="wrap">

  <nav>
    <a class="mark reveal d1" href="index.html"><span class="dot"></span>e&#8209;flex</a>
    <a class="back reveal d1" href="index.html">← Back</a>
  </nav>

  <div class="eyebrow reveal d1">Industrial Asset Owner</div>
  <h1 class="reveal d2">Tell us about your facility.</h1>

  <div class="form-wrap reveal d3">
    <iframe data-tally-src="https://tally.so/embed/PdBoRQ?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="284" frameborder="0" marginheight="0" marginwidth="0" title="Industrial Asset Owner"></iframe>
  </div>

  <footer>
    <div>© e-flex · 2026</div>
  </footer>

</div>
<script>var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w,s.onload=v,s.onerror=v,d.body.appendChild(s);}</script>
</body>
</html>
